<!DOCTYPE html>
<html>

<body>
    <canvas id="canvas"></canvas>
    <textarea id="output" style="width:100%; height:200px;"></textarea>
    <script>
        const img = new Image();
        img.onload = function () {
            const canvas = document.getElementById('canvas');
            canvas.width = img.width;
            canvas.height = img.height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0);
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            for (let i = 0; i < data.length; i += 4) {
                const r = data[i];
                const g = data[i + 1];
                const b = data[i + 2];
                // If pixel is very light (white background or outline)
                if (r > 240 && g > 240 && b > 240) {
                    // Turn it into solid black
                    data[i] = 0;
                    data[i + 1] = 0;
                    data[i + 2] = 0;
                    data[i + 3] = 255;
                }
            }
            ctx.putImageData(imageData, 0, 0);
            document.getElementById('output').value = canvas.toDataURL('image/png');
        };
        // Using the user's Downloads path (via file:// but for browser agent I might need to use a relative path if I move it)
        img.src = 'whatsapp_logo.jpeg'; 
    </script>
</body>

</html>
